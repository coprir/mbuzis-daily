# Mbuzis Daily — one-click Render Blueprint.
# Provisions the realtime server + Postgres (persistent accounts/logs) + Redis
# (horizontal scale), all wired together. Deploy: Render Dashboard → New →
# Blueprint → pick this repo → Apply. Then set the secrets marked `sync: false`.
#
# The Next.js frontend stays on Vercel (see vercel.json); after this deploys,
# set Vercel env NEXT_PUBLIC_SOCKET_URL to this server's URL and set
# CLIENT_ORIGIN below to your Vercel URL.

databases:
  - name: mbuzis-db
    plan: free # persistent Postgres (accounts, sessions, activity, logs)

services:
  # --- realtime Socket.IO + WebRTC server (durable) ---
  - type: web
    name: mbuzis-daily-server
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mbuzis-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mbuzis-redis
          property: connectionString
      - key: CLIENT_ORIGIN
        value: https://mbuzis-daily.vercel.app # ← your web app URL
      - key: REPORT_EMAIL
        value: nawmankipkorir@gmail.com
      # --- secrets you set in the Render dashboard after first deploy ---
      - key: ADMIN_CODE
        sync: false # regular moderator code
      - key: SUPER_ADMIN_CODE
        sync: false # YOUR private owner code
      - key: SMTP_URL
        sync: false # e.g. smtps://you%40gmail.com:app-pass@smtp.gmail.com:465
      - key: DIGEST_MINUTES
        value: "0"

  # --- Redis for horizontal scale (Socket.IO adapter) ---
  - type: keyvalue
    name: mbuzis-redis
    plan: free
    ipAllowList: [] # only reachable from your Render services
    maxmemoryPolicy: noeviction
