name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_SOCKET_URL: ""

  server:
    name: Server install & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - working-directory: server
        run: npm install
      - name: Boot server and hit /health
        working-directory: server
        run: |
          node src/index.js &
          PID=$!
          sleep 2
          curl -sf http://localhost:4000/health
          kill $PID
